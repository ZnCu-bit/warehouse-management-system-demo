<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>仓库系统登录</title>
    <style>
        .box{width:350px;margin:100px auto;}
        h2{text-align:center;}
    </style>
</head>
<body>
    <div class="box">
        <h2>仓库管理系统</h2>
        {% if err %}
            <p style="color:#ff0000;text-align:center">{{ err }}</p >
        {% endif %}
        <form method="post" action="{% url 'user_login' %}">
            {% csrf_token %}
            <p>6位员工工号：<input type="text" name="staff_id" maxlength="6" required style="width:100%;padding:6px;"></p >
            <p>登录密码：<input type="password" name="pwd" required style="width:100%;padding:6px;"></p >
            <p><input type="submit" value="登录" style="width:100%;height:36px;"></p >
        </form>
    </div>
</body>
</html>
