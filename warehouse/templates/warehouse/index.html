<h1 style="text-align:center;">仓库管理系统</h1>
<!-- 你的原有HTML代码 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>仓库管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <!-- 入库表单 -->
    <div class="card p-3 my-3">
        <h5>商品入库</h5>
        <form action="/in/" method="post">
            {% csrf_token %}
            <input class="form-control d-inline w-25 m-1" name="gid" placeholder="商品编号" required>
            <input class="form-control d-inline w-25 m-1" name="name" placeholder="商品名称" required>
            <input class="form-control d-inline w-25 m-1" name="num" placeholder="入库数量" type="number" required>
            <input class="form-control d-inline w-25 m-1" name="price" placeholder="单价" type="number" step="0.01" required>
            <button class="btn btn-success">确认入库</button>
        </form>
    </div>

    <!-- 出库表单 -->
    <div class="card p-3 my-3">
        <h5>商品出库</h5>
        <form action="/out/" method="post">
            {% csrf_token %}
            <input class="form-control d-inline w-25 m-1" name="gid" placeholder="商品编号" required>
            <input class="form-control d-inline w-25 m-1" name="out_num" placeholder="出库数量" type="number" required>
            <button class="btn btn-warning">确认出库</button>
        </form>
    </div>

    <!-- 库存表格 -->
    <table class="table table-bordered">
        <tr class="table-dark">
            <th>商品编号</th>
            <th>商品名称</th>
            <th>库存数量</th>
            <th>单价</th>
            <th>操作</th>
        </tr>
        {% for goods in goods_list %}
        <tr>
            <td>{{ goods.gid }}</td>
            <td>{{ goods.name }}</td>
            <td>{{ goods.stock }}</td>
            <td>{{ goods.price }}</td>
            <td>
                <a href=" " class="btn btn-danger btn-sm" onclick="return confirm('确定删除？')">删除</a >
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
