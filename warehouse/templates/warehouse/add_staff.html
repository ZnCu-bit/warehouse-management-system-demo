<!DOCTYPE html>
<html>
<head>
    <title>新增员工账号</title>
</head>
<body>
    <h3 style="text-align:center;">新增员工账号</h3>
    {% if msg %}
        <p style="color:red;text-align:center;">{{ msg }}</p >
    {% endif %}
    <form method="post" action="{% url 'add_staff' %}" style="width:300px;margin:50px auto;">
        {% csrf_token %}
        <p>员工姓名：<input type="text" name="name" required style="width:100%;padding:6px;"></p >
        <p>6位工号：<input type="text" name="sid" maxlength="6" required style="width:100%;padding:6px;"></p >
        <p>登录密码：<input type="password" name="pwd" required style="width:100%;padding:6px;"></p >
        <p><input type="submit" value="提交添加" style="width:100%;height:36px;"></p >
    </form>
    <div style="text-align:center;">
        <a href="{% url 'staff_manage' %}">返回员工列表</a >
    </div>
</body>
</html>
